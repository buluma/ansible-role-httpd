---
- name: Verify
  hosts: all
  become: true
  gather_facts: true

  vars_files:
    - ../../vars/main.yml
    - ../../defaults/main.yml

  tasks:
    - name: Check if ports are open
      ansible.builtin.wait_for:
        port: "{{ item }}"
        timeout: 2
      loop:
        - "8080"

    - name: Place sample index.html
      ansible.builtin.copy:
        content: "Hello World!"
        dest: "{{ httpd_data_directory }}/index.html"
        mode: "0644"

    - name: See if the sample index.html returns 200
      ansible.builtin.uri:
        url: "http://127.0.0.1:8080/"
        return_content: true
      register: index_html
      failed_when:
        - "'Hello World' not in index_html.content"

    - name: See if TRACE option returns 405 or 404
      ansible.builtin.uri:
        url: "http://127.0.0.1:8080/"
        method: TRACE
        status_code:
          - 405
          - 404

    - name: Ensure the htpasswd binary is installed
      ansible.builtin.package:
        name: "{{ 'httpd-tools' if ansible_facts['os_family'] == 'RedHat' else 'apache2-utils' }}"
        state: present

    - name: Create htpasswd file
      ansible.builtin.command: htpasswd -b -c /password.file my_user my_password
      args:
        creates: /password.file

    - name: Set htpasswd file permissions
      ansible.builtin.file:
        path: /password.file
        mode: "0640"

    - name: Place .htaccess
      ansible.builtin.copy:
        dest: "{{ httpd_data_directory }}/my_directory/.htaccess"
        content: |
          AuthType Basic
          AuthName "Password Required"
          AuthUserFile "/password.file"
        mode: "0644"
        owner: root
        group: root

    - name: See if authentication is required
      ansible.builtin.uri:
        url: http://127.0.0.1:8080/my_directory
        status_code:
          - 401
